<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AZ Remanufaturados</title>
<link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>

<div class="loading-overlay" id="az-loading"><div class="spinner"></div> Carregando...</div>

<!-- ═══════════════════════════
     TELA DE LOGIN
════════════════════════════ -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">⚙</div>
      <div>
        <div class="login-title">AZ Remanufaturados</div>
        <div class="login-sub">Painel interno de gestão</div>
      </div>
    </div>
    <div class="login-form-title">Entrar</div>
    <div class="login-form-sub">Acesse com seu usuário e senha.</div>
    <div id="loginError" class="error-msg"></div>
    <div class="form-field">
      <label class="form-label">Usuário</label>
      <input type="text" id="loginUser" placeholder="sistemaaz" autocomplete="username" />
    </div>
    <div class="form-field">
      <label class="form-label">Senha</label>
      <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary btn-lg" style="margin-top:8px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- ═══════════════════════════
     TELA DE SELEÇÃO DE EMPRESA
════════════════════════════ -->
<div id="empresaPage" class="empresa-page" style="display:none">
  <div class="empresa-topbar">
    <button class="empresa-sair" onclick="doLogout()">→ Sair</button>
  </div>

  <div class="empresa-header">
    <div class="empresa-eyebrow">Painel interno de gestão</div>
    <div class="empresa-welcome" id="empresaWelcome">Bem-vindo</div>
    <div class="empresa-title">Selecione a empresa</div>
  </div>

  <div class="empresa-grid" id="empresaGrid"></div>

  <div class="empresa-footer">Você pode trocar de empresa a qualquer momento após entrar</div>
</div>

<!-- ═══════════════════════════
     TELA HOME (SELEÇÃO DE MÓDULOS)
════════════════════════════ -->
<div id="homePage" style="display:none;min-height:100vh;background:#f4f5f7">

  <!-- Topbar -->
  <div style="background:#f4f5f7;border-bottom:1px solid #e2e5ec;padding:10px 20px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;position:sticky;top:0;z-index:50">
    <div></div>
    <div style="display:flex;align-items:center;justify-self:center">
      <img data-brand-logo-img alt="" style="height:48px;width:auto;display:none" />
    </div>
    <div style="display:flex;align-items:center;gap:4px;justify-self:end">
      <button onclick="trocarEmpresa()" style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;padding:4px 8px">⇄ Trocar empresa</button>
      <button onclick="doLogout()" style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;padding:4px 8px">→ Sair</button>
    </div>
  </div>

  <!-- Conteúdo -->
  <div style="padding:56px 20px 28px;max-width:1100px;margin:0 auto">
    <div id="homeWelcome" style="font-size:13px;color:#6b7280;margin-bottom:4px;text-align:center">Bem-vindo</div>
    <div id="homeTitle" style="font-size:22px;font-weight:700;color:#1a1d2e;margin-bottom:40px;text-align:center">Selecione um módulo</div>

    <!-- Grade de módulos (gerada pelo JS) -->
    <div id="modulosGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px"></div>

    <!-- Rodapé -->
    <div style="margin-top:40px;text-align:center">
      <button onclick="trocarEmpresa()" style="background:#911f21;border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;padding:10px 20px;border-radius:10px">⇄ Trocar empresa</button>
    </div>
  </div>
</div>

<script src="/shared/config.js"></script>
<script src="/shared/empresa.js"></script>
<script src="/shared/db.js"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/components.js"></script>
<script>

// ── Login ────────────────────────────────────────────────────
async function doLogin() {
  const usuario = document.getElementById('loginUser').value.trim();
  const senha   = document.getElementById('loginPassword').value;
  const errEl   = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!usuario || !senha) {
    errEl.textContent = 'Preencha usuário e senha.';
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('az-loading').classList.add('show');
  try {
    await AZ_AUTH.login(usuario, senha);
    afterLogin(usuario);
  } catch(e) {
    errEl.textContent = e.message || 'Usuário ou senha incorretos.';
    errEl.style.display = 'block';
  } finally {
    document.getElementById('az-loading').classList.remove('show');
  }
}

// ── Logout ───────────────────────────────────────────────────
function doLogout() {
  AZ_AUTH.logout();
}

// ── Pós-login: decide entre tela de empresa e a home ──────────
function afterLogin(usuario) {
  if (AZ_EMPRESA.atual()) {
    bootApp();
  } else {
    showEmpresaSelection(usuario);
  }
}

// ── Tela de seleção de empresa ────────────────────────────────
function showEmpresaSelection(usuario) {
  document.getElementById('loginPage').style.display  = 'none';
  document.getElementById('homePage').style.display   = 'none';
  document.getElementById('empresaPage').style.display = 'flex';

  const welcomeEl = document.getElementById('empresaWelcome');
  if (welcomeEl) welcomeEl.textContent = usuario ? `Bem-vindo, ${usuario}` : 'Bem-vindo';

  const grid = document.getElementById('empresaGrid');
  grid.innerHTML = AZ_EMPRESA.listar().map((emp, i) => `
    <div class="empresa-card" style="--accent:${emp.tema.primary};--accent-soft:${emp.tema.primaryLight};--delay:${i * 90}ms"
         onclick="selecionarEmpresa('${emp.id}')" tabindex="0"
         onkeydown="if(event.key==='Enter')selecionarEmpresa('${emp.id}')">
      <div class="empresa-card-icon${emp.logo ? ' has-logo' : ''}">${emp.logo ? `<img src="${emp.logo}" alt="${emp.nome}" />` : emp.icone}</div>
      <div class="empresa-card-nome">${emp.nome}</div>
      <div class="empresa-card-desc">${emp.descricao}</div>
      <div class="empresa-card-cta">Entrar →</div>
    </div>
  `).join('');
}

function selecionarEmpresa(id) {
  AZ_EMPRESA.selecionar(id);
  bootApp();
}

// ── Boot ─────────────────────────────────────────────────────
function bootApp() {
  document.getElementById('loginPage').style.display   = 'none';
  document.getElementById('empresaPage').style.display = 'none';
  document.getElementById('homePage').style.display    = 'block';
  applyEmpresaBranding('Início');
  renderModulosGrid();

  // Fundo da home: fora dos quadrados brancos dos módulos, usa a
  // mesma cor cinza dos outros botões da AZ Pesados (o resto do
  // sistema já é tematizado via CSS var(--primary), mas essa área
  // usa cor fixa então precisa do ajuste manual aqui).
  const emp = AZ_EMPRESA.atual();
  const pageBg = emp.tema.pageBg;
  document.getElementById('homePage').style.background = pageBg || '#f4f5f7';
  document.getElementById('homeWelcome').style.color = pageBg ? 'rgba(255,255,255,0.75)' : '#6b7280';
  document.getElementById('homeTitle').style.color = pageBg ? '#fff' : '#1a1d2e';
}

// ── Renderiza a grade de módulos na home ─────────────────────
// (Ícones SVG de contorno vêm de MODULO_ICON_SVG/moduloIconSvg em shared/components.js)
function renderModulosGrid() {
  const grid = document.getElementById('modulosGrid');

  const modulos = AZ_EMPRESA.atual().modulos;
  grid.innerHTML = modulos.map(m => {
    const ativo = m.ativo;
    return `
      <div
        onclick="${ativo ? `window.location.href='${m.arquivo}'` : ''}"
        style="
          background:#fff;
          border:1px solid #e2e5ec;
          border-radius:16px;
          padding:20px 22px;
          min-height:104px;
          box-sizing:border-box;
          cursor:${ativo ? 'pointer' : 'default'};
          display:flex;
          align-items:center;
          gap:16px;
          box-shadow:0 2px 8px rgba(0,0,0,0.05);
          opacity:${ativo ? '1' : '0.6'};
          transition:box-shadow 0.15s,transform 0.1s;
        "
        ${ativo ? `onmouseenter="this.style.boxShadow='0 4px 16px var(--primary-light)';this.style.transform='translateY(-1px)'"
                   onmouseleave="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.05)';this.style.transform=''"` : ''}
      >
        <div style="width:52px;height:52px;background:#f6f7f9;border:1px solid #e5e7eb;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${moduloIconSvg(m, { size: 24, stroke: '#1a1d2e' })}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:16px;color:#1a1d2e;display:flex;align-items:center;gap:8px">
            ${m.nome}
            ${!ativo ? '<span style="font-size:10px;background:#f3f4f6;color:#9ca3af;padding:2px 8px;border-radius:999px;font-weight:500">Em breve</span>' : ''}
          </div>
          <div style="font-size:13px;color:#6b7280;margin-top:3px">${m.descricao}</div>
        </div>
        ${ativo ? '<div style="color:var(--primary);font-size:20px;flex-shrink:0">›</div>' : ''}
      </div>`;
  }).join('');
}

// ── Verificar sessão ao carregar ─────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') doLogin();
});

if (AZ_AUTH.isLoggedIn()) {
  afterLogin();
}

</script>
</body>
</html>
