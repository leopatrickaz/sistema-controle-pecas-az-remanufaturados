<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Controle de Vendas — AZ Remanufaturados</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>

<div class="loading-overlay" id="az-loading"><div class="spinner"></div> Carregando...</div>

<div class="app" id="mainApp">

  <!-- SIDEBAR DESKTOP (módulos principais) -->
  <aside class="sidebar" id="mainSidebar">
    <div class="sidebar-logo">
      <div class="logo-icon has-logo"><img data-brand-logo-img alt="" /></div>
      <div class="logo-text">
        <div class="logo-title" data-brand-curto>AZ</div>
        <div class="logo-sub" data-brand-sub>Remanufaturados</div>
      </div>
    </div>
    <div id="sidebarModulosListDesktop"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user">sistemaaz</div>
      <button class="logout-btn" onclick="trocarEmpresa()" style="margin-bottom:6px">⇄ Trocar empresa</button>
      <button class="logout-btn" onclick="AZ_AUTH.logout()">→ Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR MOBILE -->
    <div class="topbar" id="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="openModulesSidebar()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1">☰</button>
        <span style="font-weight:700;font-size:14px" data-brand-nome>AZ Remanufaturados</span>
      </div>
      <button onclick="goHome()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:12px;cursor:pointer;padding:6px 12px;border-radius:8px;font-weight:500">⌂ Menu</button>
    </div>

    <!-- NAV MOBILE -->
    <div class="mobile-nav" id="mobileNav">
      <button class="nav-link" onclick="navigate('dashboard');closeMobileMenu()">Início</button>
      <button class="nav-link" onclick="navigate('empresas');closeMobileMenu()">Empresas</button>
      <button class="nav-link" onclick="navigate('produtos');closeMobileMenu()">Produtos</button>
      <button class="nav-link" onclick="navigate('vendas');closeMobileMenu()">Vendas</button>
      <button class="nav-link" onclick="AZ_AUTH.logout()">→ Sair</button>
    </div>

    <!-- SIDEBAR MOBILE DESLIZANTE -->
    <div id="modulesSidebar" style="display:none;position:fixed;inset:0;z-index:500">
      <div onclick="closeModulesSidebar()" style="position:absolute;inset:0;background:rgba(0,0,0,0.45)"></div>
      <div style="position:absolute;left:0;top:0;bottom:0;width:280px;background:#1c1c1e;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.3)">
        <div style="padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)">
          <div style="color:#fff;font-weight:700;font-size:15px"><span data-brand-icon>⚙</span> <span data-brand-nome>AZ Remanufaturados</span></div>
          <div style="color:rgba(255,255,255,0.5);font-size:11px;margin-top:2px">Módulos do sistema</div>
        </div>
        <div style="padding:12px;flex:1;overflow-y:auto" id="sidebarModulosList"></div>
        <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.1)">
          <button onclick="goHome()" style="width:100%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.7);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left;margin-bottom:6px">⌂ Tela inicial</button>
          <button onclick="trocarEmpresa()" style="width:100%;background:none;border:none;color:rgba(255,255,255,0.5);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left">⇄ Trocar empresa</button>
          <button onclick="AZ_AUTH.logout()" style="width:100%;background:none;border:none;color:rgba(255,255,255,0.5);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left">→ Sair</button>
        </div>
      </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">

      <!-- TABS DE NAVEGAÇÃO INTERNA -->
      <div style="display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--border);padding-bottom:0">
        <button id="tab-dashboard" onclick="navigate('dashboard')" style="padding:8px 18px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);transition:all 0.15s">Início</button>
        <button id="tab-empresas"  onclick="navigate('empresas')"  style="padding:8px 18px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);transition:all 0.15s">Empresas</button>
        <button id="tab-produtos"  onclick="navigate('produtos')"  style="padding:8px 18px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);transition:all 0.15s">Produtos</button>
        <button id="tab-vendas"    onclick="navigate('vendas')"    style="padding:8px 18px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);transition:all 0.15s">Vendas</button>
      </div>

      <!-- DASHBOARD -->
      <div class="page" id="page-dashboard">
        <div class="page-header">
          <div class="page-title" style="display:flex;align-items:center;gap:10px"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12v19l-3-2-3 2-3-2-3 2V2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg> Controle de Vendas</div>
          <div class="page-sub">Registre uma nova venda ou consulte o histórico.</div>
        </div>
        <button class="btn btn-primary btn-lg" style="margin-bottom:14px" onclick="openVendaModal()">+ Adicionar venda</button>
        <div class="flex-row" style="margin-bottom:14px">
          <button class="btn btn-outline" style="flex:1" onclick="openProdutoModal()">+ Adicionar produto</button>
          <button class="btn btn-outline" style="flex:1" onclick="openEmpresaModal()">+ Adicionar empresa</button>
        </div>
        <div style="display:flex;justify-content:center;margin-bottom:20px">
          <button class="btn btn-ghost btn-sm" onclick="navigate('produtos')">Ver todos os produtos</button>
        </div>
        <div class="grid2" id="dashStats"></div>
        <div class="card">
          <div class="card-header" style="padding:16px 20px 12px"><span class="card-title">Últimas vendas</span></div>
          <div class="card-body-p0 divide-y" id="dashVendas"></div>
        </div>
      </div>

      <!-- EMPRESAS -->
      <div class="page" id="page-empresas">
        <button class="back-btn" onclick="navigate('dashboard')">← Início</button>
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div><div class="page-title">Empresas</div><div class="page-sub" id="empresasCount"></div></div>
          <button class="btn btn-primary" onclick="openEmpresaModal()">+ Nova empresa</button>
        </div>
        <div class="filter-bar">
          <div class="input-wrap" style="flex:1;min-width:200px">
            <input placeholder="Buscar por nome, CNPJ, cidade..." id="empresaSearch" oninput="renderEmpresas()" />
          </div>
        </div>
        <div class="card"><div class="card-body-p0" id="empresasTable"></div></div>
      </div>

      <!-- EMPRESA DETALHE -->
      <div class="page" id="page-empresa-detail">
        <button class="back-btn" onclick="navigate('empresas')">← Empresas</button>
        <div id="empresaDetailContent"></div>
      </div>

      <!-- PRODUTOS -->
      <div class="page" id="page-produtos">
        <button class="back-btn" onclick="navigate('dashboard')">← Início</button>
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div><div class="page-title">Produtos</div><div class="page-sub" id="produtosCount"></div></div>
          <button class="btn btn-primary" onclick="openProdutoModal()">+ Novo produto</button>
        </div>
        <div class="filter-bar">
          <div class="input-wrap" style="flex:1;min-width:200px;max-width:500px">
            <input placeholder="Buscar por nome, modelo, código..." id="produtoSearch" oninput="renderProdutos()" />
          </div>
        </div>
        <div class="card"><div class="card-body-p0" id="produtosTable"></div></div>
      </div>

      <!-- VENDAS -->
      <div class="page" id="page-vendas">
        <button class="back-btn" onclick="navigate('dashboard')">← Início</button>
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div><div class="page-title">Vendas</div><div class="page-sub" id="vendasStats"></div></div>
          <div class="flex-row">
            <button class="btn btn-outline btn-sm" onclick="exportVendas()">↓ Exportar</button>
            <button class="btn btn-primary btn-sm" onclick="openVendaModal()">+ Nova venda</button>
          </div>
        </div>
        <div class="vendas-filter">
          <div class="input-wrap"><input placeholder="Buscar empresa, produto, modelo..." id="vendaSearch" oninput="renderVendas()" /></div>
          <input type="date" id="vendaFrom" oninput="renderVendas()" style="color:var(--muted)" />
        </div>
        <div class="card"><div class="card-body-p0" id="vendasList"></div></div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /app -->


<!-- ═══════════════════════════════════════════
     MODAIS
════════════════════════════════════════════ -->

<!-- MODAL VENDA -->
<div class="overlay" id="vendaOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="vendaModalTitle">Novo serviço / venda</span>
      <button class="modal-close" onclick="closeVendaModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="vendaId" />
      <div id="vendaEmpresaField" class="form-field">
        <label class="form-label">Empresa *</label>
        <select id="vendaEmpresaId"></select>
      </div>
      <div class="form-field">
        <label class="form-label">Produto *</label>
        <button type="button" id="produtoBtnSelect" onclick="openProdutoPicker()" style="width:100%;height:var(--input-h);border:1px solid var(--border);border-radius:var(--radius);background:#fff;text-align:left;padding:0 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">
          <span id="produtoBtnLabel" style="color:#9ca3af">Selecione o produto...</span>
          <span style="font-size:11px;color:var(--muted)">▼</span>
        </button>
      </div>
      <div class="form-field"><label class="form-label">Marca</label><input id="vendaMarca" placeholder="Ex: Bosch, Delco, Denso..." /></div>
      <div class="form-grid2">
        <div class="form-field"><label class="form-label">Valor cobrado (R$) *</label><input type="number" id="vendaValor" placeholder="0,00" min="0" step="0.01" /></div>
        <div class="form-field"><label class="form-label">Data *</label><input type="date" id="vendaData" /></div>
      </div>
      <div class="form-grid2">
        <div class="form-field">
          <label class="form-label">Pedido</label>
          <select id="vendaPedido">
            <option value="">Selecione...</option>
            <option value="verbal">Verbal</option>
            <option value="email">E-mail</option>
            <option value="whatsapp">WhatsApp</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">BT</label>
          <div class="toggle-group">
            <button type="button" class="toggle-opt on" id="btSim" onclick="selectBT(true)">Sim</button>
            <button type="button" class="toggle-opt"    id="btNao" onclick="selectBT(false)">Não</button>
          </div>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Serviço</label>
        <div class="toggle-group">
          <button type="button" class="toggle-opt on" id="svcReman" onclick="selectServico('remanufatura')">Remanufatura</button>
          <button type="button" class="toggle-opt"    id="svcNovo"  onclick="selectServico('novo')">Novo</button>
        </div>
      </div>
      <div class="form-field"><label class="form-label">Observações</label><textarea rows="2" id="vendaObs"></textarea></div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeVendaModal()">Cancelar</button>
        <button class="btn btn-save"  onclick="saveVenda()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL PRODUTO -->
<div class="overlay" id="produtoOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="produtoModalTitle">Novo produto</span>
      <button class="modal-close" onclick="closeProdutoModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="produtoId" />
      <div class="form-field"><label class="form-label">Nome do produto *</label><input id="produtoNome" placeholder="Nome" /></div>
      <div class="form-grid2">
        <div class="form-field">
          <label class="form-label">Tipo *</label>
          <select id="produtoTipo">
            <option value="motor_partida">Motor de partida</option>
            <option value="alternador">Alternador</option>
          </select>
        </div>
        <div class="form-field"><label class="form-label">Modelo</label><input id="produtoModelo" placeholder="Modelo" /></div>
      </div>
      <div class="form-field"><label class="form-label">Código / Referência</label><input id="produtoCodigo" placeholder="Código" /></div>
      <div class="form-field"><label class="form-label">Aplicação / Veículo</label><input id="produtoAplicacao" /></div>
      <div class="form-field"><label class="form-label">Especificações</label><textarea rows="2" id="produtoEspec"></textarea></div>
      <div class="form-field"><label class="form-label">Observações</label><textarea rows="2" id="produtoObs"></textarea></div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeProdutoModal()">Cancelar</button>
        <button class="btn btn-save"  onclick="saveProduto()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL EMPRESA -->
<div class="overlay" id="empresaOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="empresaModalTitle">Nova empresa</span>
      <button class="modal-close" onclick="closeEmpresaModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="empresaId" />
      <div class="form-field"><label class="form-label">Nome *</label><input id="empresaNome" placeholder="Razão social ou nome fantasia" /></div>
      <div class="form-grid2">
        <div class="form-field"><label class="form-label">CNPJ</label><input id="empresaCnpj" placeholder="00.000.000/0001-00" /></div>
        <div class="form-field"><label class="form-label">Telefone</label><input id="empresaTelefone" placeholder="(00) 00000-0000" /></div>
      </div>
      <div class="form-field"><label class="form-label">E-mail</label><input type="email" id="empresaEmail" placeholder="contato@empresa.com" /></div>
      <div class="form-field"><label class="form-label">Nome do contato</label><input id="empresaContato" placeholder="Nome do responsável" /></div>
      <div class="form-grid-auto">
        <div class="form-field"><label class="form-label">Cidade</label><input id="empresaCidade" placeholder="Cidade" /></div>
        <div class="form-field"><label class="form-label">UF</label><input id="empresaEstado" placeholder="PR" maxlength="2" style="text-transform:uppercase" /></div>
      </div>
      <div class="form-field"><label class="form-label">Observações</label><textarea rows="3" id="empresaObs"></textarea></div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeEmpresaModal()">Cancelar</button>
        <button class="btn btn-save"  onclick="saveEmpresa()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- PRODUTO PICKER -->
<div class="overlay" id="produtoPickerOverlay" style="z-index:200">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <span class="modal-title">Selecionar produto</span>
      <button class="modal-close" onclick="closeProdutoPicker()">✕</button>
    </div>
    <div class="modal-body" style="padding:16px">
      <div class="input-wrap" style="margin-bottom:12px">
        <span class="search-icon" style="font-size:14px;color:#9ca3af;position:absolute;left:11px;top:50%;transform:translateY(-50%)">🔍</span>
        <input placeholder="Buscar por nome, modelo, código..." id="produtoPickerSearch" oninput="filterProdutoPicker()" style="padding-left:34px" />
      </div>
      <div class="produto-list" id="produtoPickerList" style="max-height:320px"></div>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc"  id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Cancelar</button>
      <button class="btn" style="background:var(--destructive);color:#fff;border-color:var(--destructive)" onclick="executeConfirm()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="az-toast"></div>


<!-- ═══════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->
<script src="/shared/config.js"></script>
<script src="/shared/empresa.js"></script>
<script src="/shared/db.js"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/components.js"></script>
<script>

// ── Verificação de autenticação e empresa ────────────────────
if (!AZ_AUTH.requireAcesso()) { /* requireAcesso já redireciona */ }
else { applyEmpresaBranding('Controle de Vendas'); }

// ── Estado local do módulo ───────────────────────────────────
let currentPage = 'dashboard';
let currentEmpresaDetailId = null;
let selectedProdutoId = null;
let vendaFixedEmpresaId = null;
let btValue = true;
let servicoValue = 'remanufatura';
let _empresas = [], _produtos = [], _vendas = [];

// ── Inicialização ────────────────────────────────────────────
(async function init() {
  showLoading(true);
  try {
    await loadAll();
    renderSidebarModulos('vendas');
    navigate('dashboard');
  } catch(e) {
    showToast('Erro ao carregar dados', 'error');
  } finally {
    showLoading(false);
  }
})();

async function loadAll() {
  const [e, p, v] = await Promise.all([
    AZ_DB.get(AZ_DB.tbl('empresas'), '?select=*&order=nome'),
    AZ_DB.get(AZ_DB.tbl('produtos'), '?select=*&order=nome'),
    AZ_DB.get(AZ_DB.tbl('vendas'),   '?select=*&order=data_venda.desc')
  ]);
  _empresas = e || [];
  _produtos = p || [];
  _vendas   = v || [];
}

// ── Navegação interna ────────────────────────────────────────
function navigate(page, extraId) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  // tabs
  ['dashboard','empresas','produtos','vendas'].forEach(t => {
    const tab = document.getElementById('tab-' + t);
    if (tab) {
      const isActive = t === (page === 'empresa-detail' ? 'empresas' : page);
      tab.style.color = isActive ? 'var(--primary)' : 'var(--muted)';
      tab.style.borderBottomColor = isActive ? 'var(--primary)' : 'transparent';
    }
  });

  const pageId = page === 'empresa-detail' ? 'empresa-detail' : page;
  const el = document.getElementById('page-' + pageId);
  if (el) el.classList.add('active');

  if (page === 'dashboard')       renderDashboard();
  else if (page === 'empresas')   renderEmpresas();
  else if (page === 'empresa-detail') { currentEmpresaDetailId = extraId; renderEmpresaDetail(extraId); }
  else if (page === 'produtos')   renderProdutos();
  else if (page === 'vendas')     renderVendas();
}

// ── Toggle BT / Serviço ──────────────────────────────────────
function selectBT(sim) {
  btValue = sim;
  document.getElementById('btSim').classList.toggle('on', sim);
  document.getElementById('btNao').classList.toggle('on', !sim);
}

function selectServico(val) {
  servicoValue = val;
  document.getElementById('svcReman').classList.toggle('on', val === 'remanufatura');
  document.getElementById('svcNovo').classList.toggle('on', val === 'novo');
}

// ── Renders ──────────────────────────────────────────────────
function renderDashboard() {
  document.getElementById('dashStats').innerHTML = `
    <div class="stat-card"><div class="stat-icon blue">🏢</div><div class="stat-label">Empresas cadastradas</div><div class="stat-val">${_empresas.length}</div><div class="stat-link" onclick="navigate('empresas')">Ver empresas →</div></div>
    <div class="stat-card"><div class="stat-icon green">🧾</div><div class="stat-label">Vendas registradas</div><div class="stat-val">${_vendas.length}</div><div class="stat-link" onclick="navigate('vendas')">Ver vendas →</div></div>`;

  const ultimas = _vendas.slice(0, 8);
  document.getElementById('dashVendas').innerHTML = ultimas.length
    ? ultimas.map(v => {
        const e = _empresas.find(x => x.id === v.empresa_id);
        const p = _produtos.find(x => x.id === v.produto_id);
        return `<div class="item-row">
          <div style="min-width:0;flex:1">
            <div class="item-name">${esc(p ? p.nome : v.modelo || 'Produto')}</div>
            <div class="item-meta">${e ? `<a onclick="navigate('empresa-detail','${e.id}')">${esc(e.nome)}</a>` : '—'} · ${fmtDate(v.data_venda)}</div>
            <div class="item-meta" style="margin-top:3px">${badgeBT(v.bt)} ${badgeServico(v.servico)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="item-val">${brl(v.valor_total)}</div>
            <span class="badge badge-blue">${tipoLabel(v.tipo)}</span>
          </div>
        </div>`;
      }).join('')
    : '<div class="empty-state">Nenhuma venda registrada ainda.</div>';
}

function renderEmpresas() {
  const q = (document.getElementById('empresaSearch') || {}).value || '';
  const filtered = q
    ? _empresas.filter(e => [e.nome, e.cnpj, e.cidade, e.contato].filter(Boolean).join(' ').toLowerCase().includes(q.toLowerCase()))
    : _empresas;
  document.getElementById('empresasCount').textContent = `${_empresas.length} empresa(s) cadastrada(s)`;

  document.getElementById('empresaCidade').value    = emp ? emp.cidade || '' : '';
  document.getElementById('empresaEstado').value    = emp ? emp.estado || '' : '';

async function saveEmpresa() {
  const nome = document.getElementById('empresaNome').value.trim();
  if (!nome) { showToast('Nome é obrigatório', 'error'); return; }
  const id  = document.getElementById('empresaId').value;
  const obj = {
    nome,
    cnpj:        document.getElementById('empresaCnpj').value.trim() || null,
    telefone:    document.getElementById('empresaTelefone').value.trim() || null,
    email:       document.getElementById('empresaEmail').value.trim() || null,
    contato:     document.getElementById('empresaContato').value.trim() || null,
    cidade:      document.getElementById('empresaCidade').value.trim() || null,
    estado:      document.getElementById('empresaEstado').value.trim().toUpperCase() || null,
    observacoes: document.getElementById('empresaObs').value.trim() || null
  };
  showLoading(true);
  try {
    if (id) {
      await AZ_DB.update(AZ_DB.tbl('empresas'), id, obj);
      const i = _empresas.findIndex(e => e.id === id);
      _empresas[i] = { ..._empresas[i], ...obj };
      showToast('Empresa atualizada');
    } else {
      obj.id = uid(); obj.created_at = today();
      const r = await AZ_DB.insert(AZ_DB.tbl('empresas'), obj);
      _empresas.push(r[0] || obj);
      _empresas.sort((a, b) => a.nome.localeCompare(b.nome));
      showToast('Empresa cadastrada');
    }
    closeEmpresaModal();
    if (currentPage === 'empresas') renderEmpresas();
    else if (currentPage === 'empresa-detail') renderEmpresaDetail(currentEmpresaDetailId);
    else renderDashboard();
  } catch(e) { showToast('Erro ao salvar', 'error'); }
  finally { showLoading(false); }
}

async function deleteEmpresa(id) {
  showLoading(true);
  try {
    await AZ_DB.remove(AZ_DB.tbl('empresas'), id);
    _empresas = _empresas.filter(e => e.id !== id);
    _vendas   = _vendas.filter(v => v.empresa_id !== id);
    showToast('Empresa excluída');
    navigate('empresas');
  } catch(e) { showToast('Erro ao excluir', 'error'); }
  finally { showLoading(false); }
}

function openVendaModal(id, empresaId) {
  vendaFixedEmpresaId = empresaId || null;

  document.getElementById('vendaModalTitle').textContent = v ? 'Editar serviço' : 'Novo serviço / venda';
  document.getElementById('vendaId').value    = id || '';
  document.getElementById('vendaMarca').value = v ? v.marca || '' : '';
  document.getElementById('vendaValor').value = v ? v.valor_total : '';
  document.getElementById('vendaData').value  = v ? v.data_venda : today();
  document.getElementById('vendaPedido').value = v ? v.pedido || '' : '';
  document.getElementById('vendaObs').value   = v ? v.observacoes || '' : '';

  // Produto selecionado
  selectedProdutoId = v ? v.produto_id : null;
  const prod = selectedProdutoId ? _produtos.find(p => p.id === selectedProdutoId) : null;
  document.getElementById('produtoBtnLabel').textContent = prod ? prod.nome : 'Selecione o produto...';
  document.getElementById('produtoBtnLabel').style.color = prod ? 'var(--text)' : '#9ca3af';

  // BT e Serviço
  selectBT(v ? !!v.bt : true);
  selectServico(v ? v.servico || 'remanufatura' : 'remanufatura');

  // Empresa
  const sel = document.getElementById('vendaEmpresaId');
  sel.innerHTML = _empresas.map(e =>
    `<option value="${e.id}" ${(empresaId || (v && v.empresa_id)) === e.id ? 'selected' : ''}>${esc(e.nome)}</option>`
  ).join('');

  document.getElementById('vendaEmpresaField').style.display = vendaFixedEmpresaId ? 'none' : '';
  document.getElementById('vendaOverlay').classList.add('open');
}
function closeVendaModal() { document.getElementById('vendaOverlay').classList.remove('open'); }

async function saveVenda() {
  if (!selectedProdutoId) { showToast('Selecione um produto', 'error'); return; }
  const valor = parseFloat(document.getElementById('vendaValor').value);
  if (!valor || valor <= 0) { showToast('Informe o valor', 'error'); return; }
  const data = document.getElementById('vendaData').value;
  if (!data) { showToast('Informe a data', 'error'); return; }

  const id         = document.getElementById('vendaId').value;
  const empresaId  = vendaFixedEmpresaId || document.getElementById('vendaEmpresaId').value;
  const prod       = _produtos.find(p => p.id === selectedProdutoId);

  const obj = {
    empresa_id:  empresaId,
    produto_id:  selectedProdutoId,
    tipo:        prod ? prod.tipo : 'motor_partida',
    modelo:      prod ? prod.modelo || null : null,
    codigo:      prod ? prod.codigo || null : null,
    marca:       document.getElementById('vendaMarca').value.trim() || null,
    valor_total: valor,
    data_venda:  data,
    pedido:      document.getElementById('vendaPedido').value || null,
    bt:          btValue,
    servico:     servicoValue,
    observacoes: document.getElementById('vendaObs').value.trim() || null
  };

  showLoading(true);
  try {
    if (id) {
      await AZ_DB.update(AZ_DB.tbl('vendas'), id, obj);
      const i = _vendas.findIndex(v => v.id === id);
      _vendas[i] = { ..._vendas[i], ...obj };
      showToast('Venda atualizada');
    } else {
      obj.id = uid(); obj.created_at = today();
      const r = await AZ_DB.insert(AZ_DB.tbl('vendas'), obj);
      _vendas.unshift(r[0] || obj);
      showToast('Venda registrada');
    }
    closeVendaModal();
    if (currentPage === 'empresa-detail') renderEmpresaDetail(currentEmpresaDetailId);
    else if (currentPage === 'vendas') renderVendas();
    else renderDashboard();
  } catch(e) { showToast('Erro ao salvar', 'error'); }
  finally { showLoading(false); }
}

async function deleteVenda(id) {
  showLoading(true);
  try {
    await AZ_DB.remove(AZ_DB.tbl('vendas'), id);
    _vendas = _vendas.filter(v => v.id !== id);
    showToast('Venda excluída');
    if (currentPage === 'empresa-detail') renderEmpresaDetail(currentEmpresaDetailId);
    else if (currentPage === 'vendas') renderVendas();

function exportVendasEmpresa(empresaId) {
  exportCSV(_vendas.filter(v => v.empresa_id === empresaId), 'vendas_empresa');

function exportCSV(dados, nome) {
  const headers = ['Data','Empresa','Produto','Tipo','Modelo','Código','Marca','Valor','BT','Serviço','Pedido','Obs'];
  const rows = dados.map(v => {
    const e = _empresas.find(x => x.id === v.empresa_id);
    const p = _produtos.find(x => x.id === v.produto_id);
    return [
      fmtDate(v.data_venda),
      e ? e.nome : '',
      p ? p.nome : '',
      tipoLabel(v.tipo),
      v.modelo || '',
      v.codigo || '',
      v.marca  || '',
      String(v.valor_total || '').replace('.', ','),
      v.bt ? 'Sim' : 'Não',
      v.servico || '',
      pedidoLabel(v.pedido),
      v.observacoes || ''
    ].map(c => `"${String(c).replace(/"/g, '""')}"`).join(';');
  });
  const csv  = '\uFEFF' + [headers.join(';'), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `${nome}_${today()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

</script>
</body>
</html>
