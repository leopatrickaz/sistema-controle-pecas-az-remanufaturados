<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Clientes — AZ Remanufaturados</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>

<div class="loading-overlay" id="az-loading"><div class="spinner"></div> Carregando...</div>

<div class="app" id="mainApp">

  <!-- SIDEBAR DESKTOP -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon has-logo"><img data-brand-logo-img alt="" /></div>
      <div class="logo-text">
        <div class="logo-title" data-brand-curto>AZ</div>
        <div class="logo-sub" data-brand-sub>Remanufaturados</div>
      </div>
    </div>
    <div id="sidebarModulosList"></div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="trocarEmpresa()" style="margin-bottom:6px;color:#ef4444">⇄ Trocar empresa</button>
      <button class="logout-btn" onclick="AZ_AUTH.logout()">→ Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR MOBILE -->
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="openModulesSidebar()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1">☰</button>
        <span style="font-weight:700;font-size:14px" data-brand-nome>AZ Remanufaturados</span>
      </div>
      <button onclick="goHome()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:12px;cursor:pointer;padding:6px 12px;border-radius:8px;font-weight:500">⌂ Menu</button>
    </div>

    <!-- SIDEBAR MOBILE DESLIZANTE -->
    <div id="modulesSidebar" style="display:none;position:fixed;inset:0;z-index:500">
      <div onclick="closeModulesSidebar()" style="position:absolute;inset:0;background:rgba(0,0,0,0.45)"></div>
      <div style="position:absolute;left:0;top:0;bottom:0;width:280px;background:#1c1c1e;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.3)">
        <div style="padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)">
          <div style="color:#fff;font-weight:700;font-size:15px"><span data-brand-icon>⚙</span> <span data-brand-nome>AZ Remanufaturados</span></div>
          <div style="color:rgba(255,255,255,0.5);font-size:11px;margin-top:2px">Módulos do sistema</div>
        </div>
        <div style="padding:12px;flex:1;overflow-y:auto" id="sidebarModulosListMobile"></div>
        <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.1)">
          <button onclick="goHome()" style="width:100%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.7);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left;margin-bottom:6px">⌂ Tela inicial</button>
          <button onclick="trocarEmpresa()" style="width:100%;background:none;border:none;color:rgba(255,255,255,0.5);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left">⇄ Trocar empresa</button>
          <button onclick="AZ_AUTH.logout()" style="width:100%;background:none;border:none;color:rgba(255,255,255,0.5);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left">→ Sair</button>
        </div>
      </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
      <div class="page active">

        <div class="page-header">
          <div class="page-title" style="display:flex;align-items:center;gap:10px"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.4 3-6 6.5-6s6.5 2.6 6.5 6"/><circle cx="17" cy="9" r="2.4"/><path d="M17 13.2c2.6 0 4.8 1.9 4.8 5.3"/></svg> Clientes</div>
          <div class="page-sub">Controle de clientes e peças</div>
        </div>

        <div class="card">
          <div class="card-body" style="text-align:center;padding:64px 24px">
            <div style="font-size:56px;margin-bottom:16px">👥</div>
            <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px">Módulo em desenvolvimento</div>
            <div style="font-size:13px;color:var(--muted);max-width:360px;margin:0 auto;line-height:1.6">
              O módulo de Clientes está sendo preparado.<br>Em breve estará disponível aqui.
            </div>
            <button onclick="goHome()" class="btn btn-primary" style="margin-top:28px">← Voltar ao Menu</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Cancelar</button>
      <button class="btn" style="background:var(--destructive);color:#fff;border-color:var(--destructive)" onclick="executeConfirm()">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="az-toast"></div>

<script src="/shared/config.js"></script>
<script src="/shared/empresa.js"></script>
<script src="/shared/db.js"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/components.js"></script>
<script>
  // Verifica autenticação e empresa
  if (!AZ_AUTH.requireAcesso()) {
    // requireAcesso já redireciona para /
  } else {
    applyEmpresaBranding('Clientes');

    // Renderiza lista de módulos na sidebar
    renderSidebarModulos('clientes');

    // Replica para sidebar mobile
    const mobile = document.getElementById('sidebarModulosListMobile');
    if (mobile) mobile.innerHTML = document.getElementById('sidebarModulosList').innerHTML;
  }
</script>

</body>
</html>
