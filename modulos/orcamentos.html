<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Orçamentos — AZ Remanufaturados</title>
  <link rel="stylesheet" href="/shared/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="loading-overlay" id="az-loading"><div class="spinner"></div> Carregando...</div>

<div class="app" id="mainApp">

  <!-- SIDEBAR DESKTOP -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚙</div>
      <div class="logo-text">
        <div class="logo-title">AZ</div>
        <div class="logo-sub">Remanufaturados</div>
      </div>
    </div>
    <div id="sidebarModulosList"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user">sistemaaz</div>
      <button class="logout-btn" onclick="AZ_AUTH.logout()">→ Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR MOBILE -->
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="openModulesSidebar()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1">☰</button>
        <span style="font-weight:700;font-size:14px">AZ Remanufaturados</span>
      </div>
      <button onclick="goHome()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:12px;cursor:pointer;padding:6px 12px;border-radius:8px;font-weight:500">⌂ Menu</button>
    </div>

    <!-- SIDEBAR MOBILE DESLIZANTE -->
    <div id="modulesSidebar" style="display:none;position:fixed;inset:0;z-index:500">
      <div onclick="closeModulesSidebar()" style="position:absolute;inset:0;background:rgba(0,0,0,0.45)"></div>
      <div style="position:absolute;left:0;top:0;bottom:0;width:280px;background:#1e2434;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.3)">
        <div style="padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)">
          <div style="color:#fff;font-weight:700;font-size:15px">⚙ AZ Remanufaturados</div>
          <div style="color:rgba(255,255,255,0.5);font-size:11px;margin-top:2px">Módulos do sistema</div>
        </div>
        <div style="padding:12px;flex:1;overflow-y:auto" id="sidebarModulosListMobile"></div>
        <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.1)">
          <button onclick="goHome()" style="width:100%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.7);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left;margin-bottom:6px">⌂ Tela inicial</button>
          <button onclick="AZ_AUTH.logout()" style="width:100%;background:none;border:none;color:rgba(255,255,255,0.5);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left">→ Sair</button>
        </div>
      </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
      <div class="page active">

        <div class="page-header">
          <div class="page-title">📋 Orçamentos</div>
          <div class="page-sub">Gere orçamentos em PDF para seus clientes</div>
        </div>

        <button class="btn btn-primary btn-lg" style="margin-bottom:24px" onclick="openOrcamentoModal()">+ Novo orçamento</button>

        <div class="card">
          <div class="card-body" style="text-align:center;padding:48px 24px">
            <div style="font-size:48px;margin-bottom:12px">📋</div>
            <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px">Gere um orçamento</div>
            <div style="font-size:13px;color:var(--muted);max-width:360px;margin:0 auto;line-height:1.6">
              Preencha os dados do cliente e os itens para gerar o PDF do orçamento.
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>


<!-- ═══════════════════════════════════════════
     MODAL ORÇAMENTO
════════════════════════════════════════════ -->
<div class="overlay" id="orcamentoOverlay">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <span class="modal-title">Novo orçamento</span>
      <button class="modal-close" onclick="closeOrcamentoModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-grid2">
        <div class="form-field">
          <label class="form-label">Cliente *</label>
          <input id="orcCliente" placeholder="Nome do cliente" />
        </div>
        <div class="form-field">
          <label class="form-label">Data *</label>
          <input type="date" id="orcData" />
        </div>
      </div>

      <!-- cabeçalho da tabela de itens -->
      <div style="display:grid;grid-template-columns:1fr 60px 100px 32px;gap:6px;padding:6px 10px;background:#f9fafb;border-radius:6px;margin-bottom:4px">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase">Descrição</div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;text-align:center">Qtd</div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;text-align:right">Valor (R$)</div>
        <div></div>
      </div>

      <div id="orcItens"></div>

      <button type="button" class="btn btn-outline btn-sm" style="margin-top:8px;width:100%" onclick="addOrcItem()">+ Adicionar item</button>

      <div class="form-grid2" style="margin-top:14px">
        <div class="form-field">
          <label class="form-label">Observações</label>
          <input id="orcObs" placeholder="Validade, condições, etc." />
        </div>
        <div class="form-field">
          <label class="form-label">Total</label>
          <input id="orcTotal" readonly style="font-weight:700;background:#f9fafb" placeholder="R$ 0,00" />
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeOrcamentoModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="gerarOrcamentoPDF()">Gerar PDF</button>
      </div>

    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc"  id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Cancelar</button>
      <button class="btn" style="background:var(--destructive);color:#fff;border-color:var(--destructive)" onclick="executeConfirm()">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="az-toast"></div>


<!-- ═══════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->

<script src="/shared/db.js"></script>
<script src="/shared/auth.js"></script>

// ── Modal Orçamento ──────────────────────────────────────────
let _orcItemCount = 0;

function openOrcamentoModal() {
  _orcItemCount = 0;
  document.getElementById('orcCliente').value = '';
  document.getElementById('orcData').value = new Date().toISOString().slice(0, 10);
  document.getElementById('orcObs').value = '';
  document.getElementById('orcTotal').value = '';
  document.getElementById('orcItens').innerHTML = '';
  addOrcItem();
  addOrcItem();
  addOrcItem();
  document.getElementById('orcamentoOverlay').classList.add('open');
}

function closeOrcamentoModal() {
  document.getElementById('orcamentoOverlay').classList.remove('open');
}

function addOrcItem() {
  const id = ++_orcItemCount;
  const row = document.createElement('div');
  row.id = 'orc-row-' + id;
  row.style.cssText = 'display:grid;grid-template-columns:1fr 60px 100px 32px;gap:6px;padding:6px 10px;border-top:1px solid #f0f0f0;align-items:center';
  row.innerHTML =
    '<input placeholder="Descrição" style="height:32px;font-size:12px;border:1px solid #e2e5ec;border-radius:6px;padding:0 8px;width:100%" oninput="calcOrcTotal()" id="orc-desc-' + id + '" />' +
    '<input type="number" placeholder="1" min="1" style="height:32px;font-size:12px;border:1px solid #e2e5ec;border-radius:6px;padding:0 6px;text-align:center;width:100%" oninput="calcOrcTotal()" id="orc-qtd-' + id + '" />' +
    '<input type="number" placeholder="0.00" min="0" step="0.01" style="height:32px;font-size:12px;border:1px solid #e2e5ec;border-radius:6px;padding:0 6px;text-align:right;width:100%" oninput="calcOrcTotal()" id="orc-val-' + id + '" />' +
    '<button type="button" onclick="removeOrcItem(' + id + ')" style="width:28px;height:28px;background:none;border:1px solid #fee2e2;border-radius:6px;color:#ef4444;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center">✕</button>';
  document.getElementById('orcItens').appendChild(row);
}

function removeOrcItem(id) {
  const el = document.getElementById('orc-row-' + id);
  if (el) el.remove();
  calcOrcTotal();
}

function calcOrcTotal() {
  let total = 0;
  for (let i = 1; i <= _orcItemCount; i++) {
    const qtd = parseFloat(document.getElementById('orc-qtd-' + i)?.value) || 0;
    const val = parseFloat(document.getElementById('orc-val-' + i)?.value) || 0;
    total += qtd * val;
  }
  document.getElementById('orcTotal').value = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  return total;
}

async function gerarOrcamentoPDF() {
  const cliente = document.getElementById('orcCliente').value.trim();
  if (!cliente) { showToast('Informe o nome do cliente', 'error'); return; }

  const dp = document.getElementById('orcData').value.split('-');
  const dataFmt = dp.length === 3 ? dp[2] + '/' + dp[1] + '/' + dp[0] : document.getElementById('orcData').value;
  const obs   = document.getElementById('orcObs').value.trim();
  const total = calcOrcTotal();
  const totalFmt = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  const brl2 = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

  const itens = [];
  for (let i = 1; i <= _orcItemCount; i++) {
    const desc = document.getElementById('orc-desc-' + i)?.value.trim();
    const qtd  = parseFloat(document.getElementById('orc-qtd-' + i)?.value) || 0;
    const val  = parseFloat(document.getElementById('orc-val-' + i)?.value) || 0;
    if (desc) itens.push({ desc, qtd, val, sub: qtd * val });
  }
  if (!itens.length) { showToast('Adicione pelo menos um item', 'error'); return; }

  let rows = '';
  for (let i = 0; i < 8; i++) {
    const it = itens[i] || null;
    const bg = i % 2 === 0 ? '#dde3f5' : '#eef1fb';
    rows += '<tr style="background:' + bg + ';-webkit-print-color-adjust:exact">'
      + '<td style="padding:9px 16px;font-size:13px;border:1px solid #b0b8d4;text-align:center">' + (it ? it.desc : '&nbsp;') + '</td>'
      + '<td style="padding:9px 8px;font-size:13px;text-align:center;border:1px solid #b0b8d4;width:75px">' + (it ? it.qtd : '&nbsp;') + '</td>'
      + '<td style="padding:9px 16px;font-size:13px;text-align:center;border:1px solid #b0b8d4;width:145px">' + (it ? brl2(it.sub) : '&nbsp;') + '</td>'
      + '</tr>';
  }

  // Monta o HTML do orçamento em div oculto para captura
  const div = document.createElement('div');
  div.id = 'orc-render';
  div.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#f5f5f5;font-family:Arial,sans-serif;color:#1a1a1a';
  div.innerHTML =
  // Barra preta título
    '<div style="background:#1a1a1a;color:#fff;text-align:center;padding:16px;font-size:20px;font-weight:700;letter-spacing:3px">ORÇAMENTO</div>'
  // Bloco branco principal
  + '<div style="background:#fff;margin:0;padding:28px 36px 36px 36px">'
  // Linha separadora topo
  + '<div style="border-top:1px solid #ccc;margin-bottom:18px"></div>'
  // Seção empresa + logo
  + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
  + '<b style="font-size:13px">AZ REMANUFATURADOS</b>'
  + '</div>'
  + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">'
  + '<div style="font-size:11.5px;line-height:1.9;color:#222">'
  + 'Razão Social: ANTONIO ANDERLE PRANTE ME<br>'
  + 'CNPJ: 23.454.801/0001-22<br>'
  + 'IE: 9070624491<br>'
  + 'Serviços: Remanufatura / Motores de Partida e Alternadores<br>'
  + 'E-mail: az@azremanufaturados.com.br<br>'
  + 'Fone: (41) 98414-4940 / 3016-9263<br>'
  + 'Endereço: Rua Iapó 782'
  + '</div>'
  + '<img src="' + LOGO_DATA + '" style="width:160px;height:auto;margin-top:4px" crossorigin="anonymous"/>'
  + '</div>'
  // Linha separadora inferior empresa
  + '<div style="border-top:1px solid #ccc;margin-bottom:22px"></div>'
  // CLIENTE e DATA
  + '<div style="display:flex;align-items:center;margin-bottom:24px;gap:0">'
  + '<span style="font-weight:700;font-size:12.5px;margin-right:8px">CLIENTE:</span>'
  + '<span style="border-bottom:1.5px solid #555;display:inline-block;width:260px;padding-bottom:2px;font-size:12.5px;margin-right:60px">' + cliente + '</span>'
  + '<span style="font-weight:700;font-size:12.5px;margin-right:8px">DATA:</span>'
  + '<span style="border-bottom:1.5px solid #555;display:inline-block;width:140px;padding-bottom:2px;font-size:12.5px">' + dataFmt + '</span>'
  + '</div>'
  // Tabela
  + '<table style="width:100%;border-collapse:collapse;margin-bottom:28px;border:1px solid #999">'
  + '<thead><tr style="background:#1a1a1a">'
  + '<th style="padding:10px 16px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;text-align:center;color:#fff;border:1px solid #444">DESCRIÇÃO</th>'
  + '<th style="padding:10px 10px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;text-align:center;color:#fff;border:1px solid #444;width:75px">QTD</th>'
  + '<th style="padding:10px 16px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;text-align:center;color:#fff;border:1px solid #444;width:145px">VALOR</th>'
  + '</tr></thead><tbody>' + rows + '</tbody></table>'
  // OBSERVAÇÕES e TOTAL
  + '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px">'
  + '<div><span style="font-weight:700;font-size:12px;margin-right:8px">OBSERVAÇÕES:</span><span style="border-bottom:1.5px solid #555;display:inline-block;min-width:220px;padding-bottom:2px;font-size:12px">' + obs + '</span></div>'
  + '<div style="font-weight:700;font-size:13.5px">TOTAL:&nbsp;<span style="border-bottom:1.5px solid #555;display:inline-block;min-width:145px;padding-bottom:2px;text-align:center;font-size:13.5px">' + totalFmt + '</span></div>'
  + '</div>'
  // Espaço inferior
  + '<div style="height:40px"></div>'
  + '</div>';

  document.body.appendChild(div);
  showLoading(true);
  closeOrcamentoModal();

  try {
    // Aguarda imagem carregar
    const imgEl = div.querySelector('img');
    await new Promise(res => {
      if (imgEl.complete) { res(); return; }
      imgEl.onload = res;
      imgEl.onerror = res;
      setTimeout(res, 2000);
    });

    const canvas = await html2canvas(div, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      width: 794,
      windowWidth: 794
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.97);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const ratio = canvas.height / canvas.width;
    const imgH  = pageW * ratio;
    pdf.addImage(imgData, 'JPEG', 0, 0, pageW, Math.min(imgH, pageH));
    pdf.save('Orcamento_AZ_' + cliente.replace(/\s+/g, '_') + '_' + dataFmt.replace(/\//g, '-') + '.pdf');
    showToast('PDF gerado com sucesso!');
  } catch(e) {
    showToast('Erro ao gerar PDF: ' + e.message, 'error');
  } finally {
    document.body.removeChild(div);
    showLoading(false);
  }
}

// ── Fechar overlay ao clicar fora ────────────────────────────
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

</script>
</body>
</html>
