<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Orçamentos — AZ Remanufaturados</title>
  <link rel="stylesheet" href="/shared/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="loading-overlay" id="az-loading"><div class="spinner"></div> Carregando...</div>

<div class="app" id="mainApp">

  <!-- SIDEBAR DESKTOP -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚙</div>
      <div class="logo-text">
        <div class="logo-title">AZ</div>
        <div class="logo-sub">Remanufaturados</div>
      </div>
    </div>
    <div id="sidebarModulosList"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user">sistemaaz</div>
      <button class="logout-btn" onclick="AZ_AUTH.logout()">→ Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR MOBILE -->
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="openModulesSidebar()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1">☰</button>
        <span style="font-weight:700;font-size:14px">AZ Remanufaturados</span>
      </div>
      <button onclick="goHome()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:12px;cursor:pointer;padding:6px 12px;border-radius:8px;font-weight:500">⌂ Menu</button>
    </div>

    <!-- SIDEBAR MOBILE DESLIZANTE -->
    <div id="modulesSidebar" style="display:none;position:fixed;inset:0;z-index:500">
      <div onclick="closeModulesSidebar()" style="position:absolute;inset:0;background:rgba(0,0,0,0.45)"></div>
      <div style="position:absolute;left:0;top:0;bottom:0;width:280px;background:#1e2434;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.3)">
        <div style="padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)">
          <div style="color:#fff;font-weight:700;font-size:15px">⚙ AZ Remanufaturados</div>
          <div style="color:rgba(255,255,255,0.5);font-size:11px;margin-top:2px">Módulos do sistema</div>
        </div>
        <div style="padding:12px;flex:1;overflow-y:auto" id="sidebarModulosListMobile"></div>
        <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.1)">
          <button onclick="goHome()" style="width:100%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.7);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left;margin-bottom:6px">⌂ Tela inicial</button>
          <button onclick="AZ_AUTH.logout()" style="width:100%;background:none;border:none;color:rgba(255,255,255,0.5);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left">→ Sair</button>
        </div>
      </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
      <div class="page active">

        <div class="page-header">
          <div class="page-title">📋 Orçamentos</div>
          <div class="page-sub">Gere orçamentos em PDF para seus clientes</div>
        </div>

        <button class="btn btn-primary btn-lg" style="margin-bottom:24px" onclick="openOrcamentoModal()">+ Novo orçamento</button>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Histórico de orçamentos</span>
          </div>
          <div class="card-body-p0 divide-y" id="historicoList">
            <div class="empty-state" id="historicoEmpty">
              <i>📋</i>
              <div style="font-weight:600;margin-bottom:4px">Nenhum orçamento gerado ainda</div>
              <div style="font-size:12px">Os orçamentos gerados aparecerão aqui</div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>


<!-- ═══════════════════════════════════════════
     MODAL ORÇAMENTO
════════════════════════════════════════════ -->
<div class="overlay" id="orcamentoOverlay">
  <div class="modal" style="max-width:620px;max-height:90vh;overflow-y:auto;width:calc(100vw - 32px)">
    <div class="modal-header">
      <span class="modal-title">Novo orçamento</span>
      <button class="modal-close" onclick="closeOrcamentoModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-field">
        <label class="form-label">Cliente *</label>
        <input id="orcCliente" placeholder="Nome do cliente" />
      </div>
      <div class="form-field">
        <label class="form-label">Data *</label>
        <input type="date" id="orcData" style="width:100%;max-width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none;overflow:hidden;text-align:left" />
      </div>

      <!-- cabeçalho da tabela de itens -->
      <div style="display:grid;grid-template-columns:1fr 60px 100px 32px;gap:6px;padding:6px 10px;background:#f9fafb;border-radius:6px;margin-bottom:4px">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase">Descrição</div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;text-align:center">Qtd</div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;text-align:right">Valor (R$)</div>
        <div></div>
      </div>

      <div id="orcItens"></div>

      <button type="button" class="btn btn-outline btn-sm" style="margin-top:8px;width:100%" onclick="addOrcItem()">+ Adicionar item</button>

      <div class="form-grid2" style="margin-top:14px">
        <div class="form-field">
          <label class="form-label">Observações</label>
          <input id="orcObs" placeholder="Validade, condições, etc." />
        </div>
        <div class="form-field">
          <label class="form-label">Total</label>
          <input id="orcTotal" readonly style="font-weight:700;background:#f9fafb" placeholder="R$ 0,00" />
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeOrcamentoModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="gerarOrcamentoPDF()">Gerar PDF</button>
      </div>

    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc"  id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Cancelar</button>
      <button class="btn" style="background:var(--destructive);color:#fff;border-color:var(--destructive)" onclick="executeConfirm()">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="az-toast"></div>


<!-- ═══════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->

// ── Dados para autocomplete ───────────────────────────────────
let _clientes = [];
let _produtos = [];

async function loadAutoCompleteData() {
  try {
    const [empresas, produtos] = await Promise.all([
      AZ_DB.get('az_empresas', '?select=nome&order=nome'),
      AZ_DB.get('az_produtos', '?select=nome,preco_venda&order=nome')
    ]);
    _clientes = (empresas || []).map(e => e.nome).filter(Boolean);
    _produtos = (produtos || []).filter(p => p.nome);
  } catch(e) { /* silencioso */ }
}
loadAutoCompleteData();

function criarAutoComplete(input, getSugestoes, onSelecionar) {
  let dropdown = null;

  function fechar() {
    if (dropdown) { dropdown.remove(); dropdown = null; }
  }

  input.addEventListener('input', function() {
    fechar();
    const q = this.value.trim().toLowerCase();
    if (!q) return;
    const sugestoes = getSugestoes(q).slice(0, 8);
    if (!sugestoes.length) return;

    dropdown = document.createElement('div');
    dropdown.style.cssText = 'position:absolute;z-index:9999;background:#fff;border:1px solid #e2e5ec;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);width:' + input.offsetWidth + 'px;max-height:200px;overflow-y:auto;top:' + (input.offsetTop + input.offsetHeight) + 'px;left:' + input.offsetLeft + 'px';

    sugestoes.forEach(s => {
      const item = document.createElement('div');
      item.style.cssText = 'padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0';
      item.textContent = typeof s === 'string' ? s : s.nome;
      item.addEventListener('mousedown', function(e) {
        e.preventDefault();
        onSelecionar(s);
        fechar();
      });
      item.addEventListener('mouseover', function() { this.style.background = '#f5f7ff'; });
      item.addEventListener('mouseout', function() { this.style.background = ''; });
      dropdown.appendChild(item);
    });

    input.parentElement.style.position = 'relative';
    input.parentElement.appendChild(dropdown);
  });

  input.addEventListener('blur', function() {
    setTimeout(fechar, 150);
  });
}

let _orcItemCount = 0;

function openOrcamentoModal() {
  _orcItemCount = 0;
  const clienteInput = document.getElementById('orcCliente');
  clienteInput.value = '';
  document.getElementById('orcData').value = new Date().toISOString().slice(0, 10);
  document.getElementById('orcObs').value = '';
  document.getElementById('orcTotal').value = '';
  document.getElementById('orcItens').innerHTML = '';

  // Autocomplete de clientes
  criarAutoComplete(
    clienteInput,
    q => _clientes.filter(c => c.toLowerCase().includes(q)),
    nome => { clienteInput.value = nome; }
  );

  addOrcItem();
  addOrcItem();
  addOrcItem();
  document.getElementById('orcamentoOverlay').classList.add('open');
}

function closeOrcamentoModal() {
  document.getElementById('orcamentoOverlay').classList.remove('open');
}

function addOrcItem() {
  const id = ++_orcItemCount;
  const row = document.createElement('div');
  row.id = 'orc-row-' + id;
  row.style.cssText = 'display:grid;grid-template-columns:1fr 60px 100px 32px;gap:6px;padding:6px 10px;border-top:1px solid #f0f0f0;align-items:center';
  row.innerHTML =
    '<input placeholder="Descrição" style="height:32px;font-size:12px;border:1px solid #e2e5ec;border-radius:6px;padding:0 8px;width:100%" oninput="calcOrcTotal()" id="orc-desc-' + id + '" />' +
    '<input type="number" placeholder="1" min="1" style="height:32px;font-size:12px;border:1px solid #e2e5ec;border-radius:6px;padding:0 6px;text-align:center;width:100%" oninput="calcOrcTotal()" id="orc-qtd-' + id + '" />' +
    '<input type="number" placeholder="0.00" min="0" step="0.01" style="height:32px;font-size:12px;border:1px solid #e2e5ec;border-radius:6px;padding:0 6px;text-align:right;width:100%" oninput="calcOrcTotal()" id="orc-val-' + id + '" />' +
    '<button type="button" onclick="removeOrcItem(' + id + ')" style="width:28px;height:28px;background:none;border:1px solid #fee2e2;border-radius:6px;color:#ef4444;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center">✕</button>';
  document.getElementById('orcItens').appendChild(row);

  // Autocomplete de produtos no campo descrição
  const descInput = document.getElementById('orc-desc-' + id);
  const valInput  = document.getElementById('orc-val-'  + id);
  criarAutoComplete(
    descInput,
    q => _produtos.filter(p => p.nome.toLowerCase().includes(q)),
    p => {
      descInput.value = p.nome;
      if (p.preco_venda) valInput.value = p.preco_venda;
      calcOrcTotal();
    }
  );
}

function removeOrcItem(id) {
  const el = document.getElementById('orc-row-' + id);
  if (el) el.remove();
  calcOrcTotal();
}

function calcOrcTotal() {
  let total = 0;
  document.querySelectorAll('#orcItens > div').forEach(row => {
    const id  = row.id.replace('orc-row-', '');
    const qtd = parseFloat(document.getElementById('orc-qtd-' + id)?.value) || 0;
    const val = parseFloat(document.getElementById('orc-val-' + id)?.value) || 0;
    total += qtd * val;
  });
  document.getElementById('orcTotal').value = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  return total;
}

async function gerarOrcamentoPDF() {
  const cliente = document.getElementById('orcCliente').value.trim();
  if (!cliente) { showToast('Informe o nome do cliente', 'error'); return; }

  const dp = document.getElementById('orcData').value.split('-');
  const dataFmt = dp.length === 3 ? dp[2] + '/' + dp[1] + '/' + dp[0] : document.getElementById('orcData').value;
  const obs   = document.getElementById('orcObs').value.trim();
  const total = calcOrcTotal();
  const totalFmt = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  const brl2 = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

  const itens = [];
  document.querySelectorAll('#orcItens > div').forEach(row => {
    const id   = row.id.replace('orc-row-', '');
    const desc = document.getElementById('orc-desc-' + id)?.value.trim();
    const qtd  = parseFloat(document.getElementById('orc-qtd-' + id)?.value) || 0;
    const val  = parseFloat(document.getElementById('orc-val-' + id)?.value) || 0;
    if (desc) itens.push({ desc, qtd, val, sub: qtd * val });
  });
  if (!itens.length) { showToast('Adicione pelo menos um item', 'error'); return; }

  let rows = '';
  for (let i = 0; i < 8; i++) {
    const it = itens[i] || null;
    const bg = i % 2 === 0 ? '#f3f4f6' : '#ffffff';
    rows += '<tr style="background:' + bg + ';-webkit-print-color-adjust:exact">'
      + '<td style="padding:9px 14px;font-size:13px;border:1px solid #d1d5db;text-align:center">' + (it ? it.desc : '&nbsp;') + '</td>'
      + '<td style="padding:9px 8px;font-size:13px;text-align:center;border:1px solid #d1d5db;width:80px">' + (it ? it.qtd : '&nbsp;') + '</td>'
      + '<td style="padding:9px 14px;font-size:13px;text-align:center;border:1px solid #d1d5db;width:150px">' + (it ? brl2(it.val) : '&nbsp;') + '</td>'
      + '</tr>';
  }

  // Monta o HTML do orçamento em div oculto para captura
  const div = document.createElement('div');
  div.id = 'orc-render';
  div.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#f0f0f0;font-family:Arial,sans-serif;color:#1a1a1a;font-size:16px;-webkit-text-size-adjust:none;text-size-adjust:none';

  const campo = (val, w) =>
    '<div style="display:inline-block;width:' + w + 'px;height:20px;position:relative;vertical-align:bottom">'
  + '<div style="position:absolute;bottom:3px;left:0;right:0;border-bottom:1.5px solid #444"></div>'
  + '<div style="position:absolute;bottom:1px;left:2px;right:2px;font-size:12.5px;line-height:20px;height:20px;overflow:hidden;white-space:nowrap">' + (val || '') + '</div>'
  + '</div>';

  div.innerHTML =
    '<div style="background:#1a1a1a;color:#fff;text-align:center;padding:16px;font-size:16px;font-weight:700;letter-spacing:3px">ORÇAMENTO</div>'
  + '<div style="background:#fff;padding:28px 32px 32px">'
  + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #ccc">'
  + '<div style="flex:1">'
  + '<div style="font-size:15px;font-weight:700;margin-bottom:8px">AZ REMANUFATURADOS</div>'
  + '<div style="font-size:11px;line-height:1.9">Razão Social: ANTONIO ANDERLE PRANTE ME</div>'
  + '<div style="font-size:11px;line-height:1.9">CNPJ: 23.454.801/0001-22</div>'
  + '<div style="font-size:11px;line-height:1.9">IE: 9070624491</div>'
  + '<div style="font-size:11px;line-height:1.9">Serviços: Remanufatura / Motores de Partida e Alternadores</div>'
  + '<div style="font-size:11px;line-height:1.9">E-mail: az@azremanufaturados.com.br</div>'
  + '<div style="font-size:11px;line-height:1.9">Fone: (41) 98414-4940 / 3016-9263</div>'
  + '<div style="font-size:11px;line-height:1.9">Endereço: Rua Iapó 782</div>'
  + '</div>'
  + '<div style="width:220px;display:flex;justify-content:center;align-items:center;flex-shrink:0;padding-right:60px">'
  + '<img src="' + LOGO_DATA + '" style="width:160px;height:auto" crossorigin="anonymous"/>'
  + '</div>'
  + '</div>'
  + '<div style="display:flex;align-items:flex-end;margin-bottom:22px">'
  + '<div style="display:flex;align-items:flex-end;gap:3px;flex:1">'
  + '<span style="font-weight:700;font-size:12.5px;line-height:1;padding-bottom:4px">CLIENTE:</span>' + campo(cliente, 240)
  + '</div>'
  + '<div style="display:flex;align-items:flex-end;gap:3px;width:230px;flex-shrink:0">'
  + '<span style="font-weight:700;font-size:12.5px;line-height:1;padding-bottom:4px">DATA:</span>' + campo(dataFmt, 160)
  + '</div>'
  + '</div>'
  + '<table style="width:100%;border-collapse:collapse;margin-bottom:22px">'
  + '<thead><tr style="background:#1a1a1a">'
  + '<th style="padding:4px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;text-align:center;color:#fff;border:1px solid #444">DESCRIÇÃO</th>'
  + '<th style="padding:4px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;text-align:center;color:#fff;border:1px solid #444;width:80px">QTD</th>'
  + '<th style="padding:4px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;text-align:center;color:#fff;border:1px solid #444;width:150px">VALOR<br><span style="font-size:11.5px;font-weight:400;text-transform:none;letter-spacing:0">(por item)</span></th>'
  + '</tr></thead><tbody>' + rows + '</tbody></table>'
  + '<div style="display:flex;justify-content:space-between;align-items:flex-end">'
  + '<div style="display:flex;align-items:flex-end;gap:3px;flex:1"><span style="font-weight:700;font-size:12.5px;line-height:1;padding-bottom:4px">OBSERVAÇÕES:</span>' + campo(obs, 220) + '</div>'
  + '<div style="display:flex;align-items:flex-end;gap:3px;width:230px;flex-shrink:0"><span style="font-weight:700;font-size:12.5px;line-height:1;padding-bottom:4px">TOTAL:</span>' + campo(totalFmt, 160) + '</div>'
  + '</div>'
  + '</div>';

  document.body.appendChild(div);
  showLoading(true);
  closeOrcamentoModal();

  try {
    // Aguarda imagem carregar
    const imgEl = div.querySelector('img');
    await new Promise(res => {
      if (imgEl.complete) { res(); return; }
      imgEl.onload = res;
      imgEl.onerror = res;
      setTimeout(res, 2000);
    });

    const canvas = await html2canvas(div, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      width: 794,
      windowWidth: 794,
      windowHeight: 1123,
      dpi: 144,
      letterRendering: true
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.97);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const ratio = canvas.height / canvas.width;
    const imgH  = pageW * ratio;
    pdf.addImage(imgData, 'JPEG', 0, 0, pageW, Math.min(imgH, pageH));
    const dataNome = dataFmt.replace(/\//g, '.');
    const nomeArquivo = 'Orçamento ' + cliente + ' - ' + dataNome + '.pdf';
    const pdfBlob = pdf.output('blob');

    // Salvar no histórico
    const arrBuffer = await pdfBlob.arrayBuffer();
    const uint8 = new Uint8Array(arrBuffer);
    let binary = '';
    for (let i = 0; i < uint8.length; i++) binary += String.fromCharCode(uint8[i]);
    const pdfBase64 = btoa(binary);
    salvarNoHistorico(cliente, dataFmt, pdfBase64, nomeArquivo);

    // iOS Safari: usa Web Share API para compartilhar o arquivo direto, sem blob URL
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS && navigator.share) {
      const file = new File([pdfBlob], nomeArquivo, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: nomeArquivo });
        return;
      }
    }

    // Desktop e outros: download direto
    const blobUrl = URL.createObjectURL(pdfBlob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = nomeArquivo;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
    showToast('PDF gerado com sucesso!');
  } catch(e) {
    showToast('Erro ao gerar PDF: ' + e.message, 'error');
  } finally {
    document.body.removeChild(div);
    showLoading(false);
  }
}

// ── Histórico de orçamentos ──────────────────────────────────
const HISTORICO_KEY = 'az_orcamentos_historico';

function loadHistorico() {
  try { return JSON.parse(localStorage.getItem(HISTORICO_KEY) || '[]'); }
  catch { return []; }
}

function saveHistorico(lista) {
  localStorage.setItem(HISTORICO_KEY, JSON.stringify(lista));
}

function renderHistorico() {
  const lista = loadHistorico();
  const container = document.getElementById('historicoList');
  const empty = document.getElementById('historicoEmpty');
  if (!lista.length) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  // Renderiza apenas os itens (mantém o empty-state no DOM)
  const items = container.querySelectorAll('.orc-hist-item');
  items.forEach(el => el.remove());
  lista.slice().reverse().forEach((item, idx) => {
    const realIdx = lista.length - 1 - idx;
    const row = document.createElement('div');
    row.className = 'item-row orc-hist-item';
    row.style.cursor = 'pointer';
    row.innerHTML = `
      <div style="flex:1;min-width:0" onclick="abrirOrcamento(${realIdx})">
        <div class="item-name">${item.cliente}</div>
        <div class="item-meta">${item.data}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="abrirOrcamento(${realIdx})">↓ Abrir</button>
        <button class="btn btn-danger-ghost btn-sm btn-icon" onclick="excluirOrcamento(${realIdx})">✕</button>
      </div>`;
    container.appendChild(row);
  });
}

function salvarNoHistorico(cliente, data, pdfBase64, nomeArquivo) {
  const lista = loadHistorico();
  lista.push({ cliente, data, pdfBase64, nomeArquivo, geradoEm: new Date().toISOString() });
  saveHistorico(lista);
  renderHistorico();
}

function abrirOrcamento(idx) {
  const lista = loadHistorico();
  const item = lista[idx];
  if (!item) return;
  const blob = new Blob([Uint8Array.from(atob(item.pdfBase64), c => c.charCodeAt(0))], { type: 'application/pdf' });
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS && navigator.share) {
    const file = new File([blob], item.nomeArquivo, { type: 'application/pdf' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: item.nomeArquivo });
      return;
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = item.nomeArquivo;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function excluirOrcamento(idx) {
  const lista = loadHistorico();
  lista.splice(idx, 1);
  saveHistorico(lista);
  renderHistorico();
}

// Inicializar histórico
renderHistorico();
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});
