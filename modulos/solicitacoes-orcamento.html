<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Solicitações de Orçamento — AZ Pesados</title>
<link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>

<div class="loading-overlay" id="az-loading"><div class="spinner"></div> Carregando...</div>

<div class="app" id="mainApp">

  <!-- SIDEBAR DESKTOP -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon" data-brand-icon>⚙</div>
      <div class="logo-text">
        <div class="logo-title" data-brand-curto>AZ</div>
        <div class="logo-sub" data-brand-sub>Remanufaturados</div>
      </div>
    </div>
    <div id="sidebarModulosList"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user">sistemaaz</div>
      <button class="logout-btn" onclick="trocarEmpresa()" style="margin-bottom:6px">⇄ Trocar empresa</button>
      <button class="logout-btn" onclick="AZ_AUTH.logout()">→ Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR MOBILE -->
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="openModulesSidebar()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1">☰</button>
        <span style="font-weight:700;font-size:14px" data-brand-nome>AZ Remanufaturados</span>
      </div>
      <button onclick="goHome()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:12px;cursor:pointer;padding:6px 12px;border-radius:8px;font-weight:500">⌂ Menu</button>
    </div>

    <!-- SIDEBAR MOBILE DESLIZANTE -->
    <div id="modulesSidebar" style="display:none;position:fixed;inset:0;z-index:500">
      <div onclick="closeModulesSidebar()" style="position:absolute;inset:0;background:rgba(0,0,0,0.45)"></div>
      <div style="position:absolute;left:0;top:0;bottom:0;width:280px;background:#1e2434;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.3)">
        <div style="padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)">
          <div style="color:#fff;font-weight:700;font-size:15px"><span data-brand-icon>⚙</span> <span data-brand-nome>AZ Remanufaturados</span></div>
          <div style="color:rgba(255,255,255,0.5);font-size:11px;margin-top:2px">Módulos do sistema</div>
        </div>
        <div style="padding:12px;flex:1;overflow-y:auto" id="sidebarModulosListMobile"></div>
        <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.1)">
          <button onclick="goHome()" style="width:100%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.7);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left;margin-bottom:6px">⌂ Tela inicial</button>
          <button onclick="trocarEmpresa()" style="width:100%;background:none;border:none;color:rgba(255,255,255,0.5);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left">⇄ Trocar empresa</button>
          <button onclick="AZ_AUTH.logout()" style="width:100%;background:none;border:none;color:rgba(255,255,255,0.5);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left">→ Sair</button>
        </div>
      </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
      <div class="page active">

        <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div>
            <div class="page-title">📩 Solicitações de Orçamento</div>
            <div class="page-sub" id="solicitacoesCount">Pedidos enviados pelo formulário do site</div>
          </div>
          <button class="btn btn-primary" onclick="openSolicitacaoModal()">+ Nova solicitação</button>
        </div>

        <div class="filter-bar">
          <div class="input-wrap" style="flex:1;min-width:200px">
            <span class="search-icon">🔍</span>
            <input placeholder="Buscar por nome, e-mail, telefone ou peça..." id="solicitacaoSearch" oninput="renderSolicitacoes()" />
          </div>
          <div class="toggle-group" style="width:280px;flex-shrink:0">
            <button type="button" class="toggle-opt on" id="filtroTodas"      onclick="setFiltroStatus('todas')">Todas</button>
            <button type="button" class="toggle-opt"    id="filtroNovas"      onclick="setFiltroStatus('novo')">Novas</button>
            <button type="button" class="toggle-opt"    id="filtroRespondidas" onclick="setFiltroStatus('respondido')">Respondidas</button>
          </div>
        </div>

        <div class="card"><div class="card-body-p0" id="solicitacoesList"></div></div>

      </div>
    </div>
  </div>
</div>

<!-- MODAL SOLICITAÇÃO -->
<div class="overlay" id="solicitacaoOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="solicitacaoModalTitle">Nova solicitação</span>
      <button class="modal-close" onclick="closeSolicitacaoModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="solicitacaoId" />
      <div class="form-field"><label class="form-label">Nome *</label><input id="solicitacaoNome" placeholder="Nome do cliente" /></div>
      <div class="form-grid2">
        <div class="form-field"><label class="form-label">E-mail *</label><input type="email" id="solicitacaoEmail" placeholder="cliente@email.com" /></div>
        <div class="form-field"><label class="form-label">Telefone</label><input id="solicitacaoTelefone" placeholder="(00) 00000-0000" /></div>
      </div>
      <div class="form-field"><label class="form-label">Peça desejada *</label><textarea rows="2" id="solicitacaoPeca" placeholder="Descrição da peça solicitada"></textarea></div>
      <div class="form-field"><label class="form-label">Observações internas</label><textarea rows="2" id="solicitacaoObs"></textarea></div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeSolicitacaoModal()">Cancelar</button>
        <button class="btn btn-save"  onclick="saveSolicitacao()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Cancelar</button>
      <button class="btn" style="background:var(--destructive);color:#fff;border-color:var(--destructive)" onclick="executeConfirm()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="az-toast"></div>

<script src="/shared/config.js"></script>
<script src="/shared/empresa.js"></script>
<script src="/shared/db.js"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/components.js"></script>
<script>

// ── Verificação de autenticação e empresa ────────────────────
let _filtroStatus = 'todas';
let _solicitacoes = [];

if (!AZ_AUTH.requireAcesso()) {
  // requireAcesso já redireciona
} else if (AZ_EMPRESA.atual().id !== 'pesados') {
  // Módulo exclusivo da AZ Pesados
  goHome();
} else {
  applyEmpresaBranding('Solicitações de Orçamento');
  renderSidebarModulos('solicitacoes');

  const mobile = document.getElementById('sidebarModulosListMobile');
  if (mobile) mobile.innerHTML = document.getElementById('sidebarModulosList').innerHTML;

  init();
}

async function init() {
  showLoading(true);
  try {
    await loadSolicitacoes();
    renderSolicitacoes();
  } catch (e) {
    showToast('Erro ao carregar solicitações', 'error');
  } finally {
    showLoading(false);
  }
}

async function loadSolicitacoes() {
  const r = await AZ_DB.get(AZ_DB.tbl('solicitacoes_orcamento'), '?select=*&order=created_at.desc');
  _solicitacoes = r || [];
}

function setFiltroStatus(status) {
  _filtroStatus = status;
  document.getElementById('filtroTodas').classList.toggle('on', status === 'todas');
  document.getElementById('filtroNovas').classList.toggle('on', status === 'novo');
  document.getElementById('filtroRespondidas').classList.toggle('on', status === 'respondido');
  renderSolicitacoes();
}

function renderSolicitacoes() {
  const q = (document.getElementById('solicitacaoSearch') || {}).value || '';
  let filtered = _solicitacoes;
  if (_filtroStatus !== 'todas') filtered = filtered.filter(s => s.status === _filtroStatus);
  if (q) {
    const qq = q.toLowerCase();
    filtered = filtered.filter(s => [s.nome, s.email, s.telefone, s.peca].filter(Boolean).join(' ').toLowerCase().includes(qq));
  }

  const novas = _solicitacoes.filter(s => s.status === 'novo').length;
  document.getElementById('solicitacoesCount').textContent =
    `${_solicitacoes.length} solicitação(ões) recebida(s) · ${novas} nova(s)`;

  document.getElementById('solicitacoesList').innerHTML = filtered.length
    ? '<div class="divide-y">' + filtered.map(s => `
        <div class="item-row">
          <div style="min-width:0;flex:1">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="item-name">${esc(s.nome)}</span>
              <span class="badge" style="cursor:pointer;background:${s.status === 'novo' ? '#dbeafe' : '#dcfce7'};color:${s.status === 'novo' ? '#1d4ed8' : '#166534'};border-color:transparent"
                    onclick="toggleStatus('${s.id}')">${s.status === 'novo' ? '● Novo' : '✓ Respondido'}</span>
            </div>
            <div class="item-meta">${esc(s.peca)}</div>
            <div class="item-meta">${esc(s.email)}${s.telefone ? ' · ' + esc(s.telefone) : ''} · ${fmtDateTime(s.created_at)}</div>
            ${s.observacoes ? `<div style="font-size:12px;font-style:italic;color:var(--muted);margin-top:2px">${esc(s.observacoes)}</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="item-actions">
              <button class="btn btn-ghost btn-sm btn-icon" onclick="openSolicitacaoModal('${s.id}')">✎</button>
              <button class="btn btn-danger-ghost btn-sm btn-icon" onclick="openConfirm('Excluir solicitação?','Esta ação não pode ser desfeita.',()=>{deleteSolicitacao('${s.id}')})">✕</button>
            </div>
          </div>
        </div>`).join('') + '</div>'
    : '<div class="empty-state">Nenhuma solicitação encontrada.</div>';
}

async function toggleStatus(id) {
  const s = _solicitacoes.find(x => x.id === id);
  if (!s) return;
  const novoStatus = s.status === 'novo' ? 'respondido' : 'novo';
  try {
    await AZ_DB.update(AZ_DB.tbl('solicitacoes_orcamento'), id, { status: novoStatus });
    s.status = novoStatus;
    renderSolicitacoes();
  } catch (e) { showToast('Erro ao atualizar status', 'error'); }
}

// ── Modal ──────────────────────────────────────────────────
function openSolicitacaoModal(id) {
  const s = id ? _solicitacoes.find(x => x.id === id) : null;
  document.getElementById('solicitacaoModalTitle').textContent = s ? 'Editar solicitação' : 'Nova solicitação';
  document.getElementById('solicitacaoId').value        = id || '';
  document.getElementById('solicitacaoNome').value      = s ? s.nome : '';
  document.getElementById('solicitacaoEmail').value     = s ? s.email : '';
  document.getElementById('solicitacaoTelefone').value  = s ? s.telefone || '' : '';
  document.getElementById('solicitacaoPeca').value      = s ? s.peca : '';
  document.getElementById('solicitacaoObs').value       = s ? s.observacoes || '' : '';
  document.getElementById('solicitacaoOverlay').classList.add('open');
}
function closeSolicitacaoModal() { document.getElementById('solicitacaoOverlay').classList.remove('open'); }

async function saveSolicitacao() {
  const nome  = document.getElementById('solicitacaoNome').value.trim();
  const email = document.getElementById('solicitacaoEmail').value.trim();
  const peca  = document.getElementById('solicitacaoPeca').value.trim();
  if (!nome || !email || !peca) { showToast('Preencha nome, e-mail e peça', 'error'); return; }

  const id  = document.getElementById('solicitacaoId').value;
  const obj = {
    nome, email, peca,
    telefone:    document.getElementById('solicitacaoTelefone').value.trim() || null,
    observacoes: document.getElementById('solicitacaoObs').value.trim() || null
  };

  showLoading(true);
  try {
    if (id) {
      await AZ_DB.update(AZ_DB.tbl('solicitacoes_orcamento'), id, obj);
      const i = _solicitacoes.findIndex(s => s.id === id);
      _solicitacoes[i] = { ..._solicitacoes[i], ...obj };
      showToast('Solicitação atualizada');
    } else {
      obj.status = 'novo';
      const r = await AZ_DB.insert(AZ_DB.tbl('solicitacoes_orcamento'), obj);
      _solicitacoes.unshift(r[0] || obj);
      showToast('Solicitação cadastrada');
    }
    closeSolicitacaoModal();
    renderSolicitacoes();
  } catch (e) { showToast('Erro ao salvar', 'error'); }
  finally { showLoading(false); }
}

async function deleteSolicitacao(id) {
  showLoading(true);
  try {
    await AZ_DB.remove(AZ_DB.tbl('solicitacoes_orcamento'), id);
    _solicitacoes = _solicitacoes.filter(s => s.id !== id);
    renderSolicitacoes();
    showToast('Solicitação excluída');
  } catch (e) { showToast('Erro ao excluir', 'error'); }
  finally { showLoading(false); }
}

</script>

</body>
</html>
