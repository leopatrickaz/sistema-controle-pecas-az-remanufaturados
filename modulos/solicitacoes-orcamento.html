<script>

// ── Verificação de autenticação e empresa ────────────────────
let _tabAtual = 'orcamento';
let _filtroOrc = 'todas';
let _filtroPers = 'todas';
let _orcamentos = [];
let _personalizadas = [];
const AZ_SOM_KEY = 'az_solicitacoes_som_ativo';
let _audioCtx = null;

if (!AZ_AUTH.requireAcesso()) {
  // requireAcesso já redireciona
} else if (AZ_EMPRESA.atual().id !== 'pesados') {
  // Módulo exclusivo da AZ Pesados
  goHome();
} else {
  applyEmpresaBranding('Solicitações de Orçamento');
  renderSidebarModulos('solicitacoes');

  const mobile = document.getElementById('sidebarModulosListMobile');
  if (mobile) mobile.innerHTML = document.getElementById('sidebarModulosList').innerHTML;

  tentarDestravarSomAutomaticamente();
  init();
}

async function init() {
  showLoading(true);
  try {
    await Promise.all([loadOrcamentos(), loadPersonalizadas()]);
    renderOrcamentos();
    renderPersonalizadas();
  } catch (e) {
    showToast('Erro ao carregar solicitações', 'error');
  } finally {
    showLoading(false);
  }
  startAutoRefresh();
}

// ── Atualização automática ───────────────────────────────────
// Verifica periodicamente se chegaram novas solicitações (enviadas
// pelo site) e as insere na lista sem precisar recarregar a página.
const AUTO_REFRESH_MS = 10000;
let _autoRefreshTimer = null;

function startAutoRefresh() {
  if (_autoRefreshTimer) return;
  _autoRefreshTimer = setInterval(checkNovasSolicitacoes, AUTO_REFRESH_MS);
}

// Continua verificando mesmo com a aba em segundo plano (minimizada
// ou trocada por outra), para o aviso sonoro funcionar independente
// do que você estiver fazendo no navegador. Ao voltar para a aba,
// confere na hora, sem esperar o próximo ciclo.
// Obs: navegadores atrasam timers de abas em segundo plano por muito
// tempo (o Chrome, por exemplo, passa a checar só 1x por minuto após
// alguns minutos em segundo plano) — é uma limitação de economia de
// bateria do próprio navegador, o som ainda toca, só pode demorar um
// pouco mais nesses casos.
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) checkNovasSolicitacoes();
});

async function checkNovasSolicitacoes() {
  try {
    const [orc, pers] = await Promise.all([
      AZ_DB.get(AZ_DB.tbl('solicitacoes_orcamento'), '?select=*&order=created_at.desc'),
      AZ_DB.get(AZ_DB.tbl('solicitacoes_personalizadas'), '?select=*&order=created_at.desc')
    ]);
    const chegouOrc  = mergeNovasSolicitacoes(_orcamentos, orc || [], 'orçamento', renderOrcamentos);
    const chegouPers = mergeNovasSolicitacoes(_personalizadas, pers || [], 'personalizada', renderPersonalizadas);
    if (chegouOrc || chegouPers) playNotificationSound();
  } catch (e) {
    // Falha silenciosa: tenta de novo no próximo ciclo, sem incomodar o usuário
  }
}

function mergeNovasSolicitacoes(atual, recebidos, rotulo, render) {
  const idsAtuais = new Set(atual.map(x => x.id));
  const novos = recebidos.filter(r => !idsAtuais.has(r.id));
  if (!novos.length) return false;
  novos.forEach(n => atual.unshift(n));
  render();
  showToast(`${novos.length} nova${novos.length > 1 ? 's' : ''} solicitação${novos.length > 1 ? 'ões' : ''} de ${rotulo}`);
  return true;
}

// ── Aviso sonoro ──────────────────────────────────────────────
// Toca um bipe curto (gerado na hora, sem arquivo de áudio) quando
// uma nova solicitação chega. Navegadores só liberam áudio depois de
// uma interação direta do usuário na página — isso vale por
// carregamento de página, não dá pra "destravar para sempre" de
// verdade. Por isso guardamos a preferência (AZ_SOM_KEY) e, uma vez
// ativada, destravamos sozinhos no primeiro clique/tecla que o
// usuário der na página (qualquer um, não precisa ser no botão) —
// assim ele não precisa lembrar de clicar em nada especial de novo.

function getAudioCtx() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return null;
  if (!_audioCtx) _audioCtx = new Ctx();
  return _audioCtx;
}

function atualizarBotaoSom(ativo) {
  const btn = document.getElementById('somToggleBtn');
  if (!btn) return;
  btn.textContent = ativo ? '🔔 Som ativado' : '🔔 Ativar aviso sonoro';
  btn.disabled = ativo;
  btn.style.opacity = ativo ? '0.7' : '1';
}

function ativarSom() {
  const ctx = getAudioCtx();
  if (!ctx) { showToast('Seu navegador não suporta som', 'error'); return; }

  const finish = () => {
    localStorage.setItem(AZ_SOM_KEY, '1');
    atualizarBotaoSom(true);
    playNotificationSound();
    showToast('Aviso sonoro ativado — fica lembrado para as próximas vezes');
  };

  if (ctx.state === 'suspended') ctx.resume().then(finish).catch(finish);
  else finish();
}

// Se o usuário já ativou o som antes, tenta destravar de novo assim que
// ele interagir com a página pela primeira vez nesta sessão — sem
// precisar clicar em nenhum botão específico.
function tentarDestravarSomAutomaticamente() {
  if (localStorage.getItem(AZ_SOM_KEY) !== '1') return;
  atualizarBotaoSom(true);

  const tentar = () => {
    const ctx = getAudioCtx();
    if (ctx && ctx.state === 'suspended') ctx.resume();
  };
  tentar();
  ['click', 'keydown', 'touchstart'].forEach(evt =>
    document.addEventListener(evt, tentar, { once: true })
  );
}

function playNotificationSound() {
  const ctx = getAudioCtx();
  if (!ctx || ctx.state === 'suspended') return;

  const now = ctx.currentTime;
  [880, 1174.66].forEach((freq, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const start = now + i * 0.12;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.25, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.28);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(start);
    osc.stop(start + 0.3);
  });
}

function navigateTab(tab) {
  _tabAtual = tab;
  ['orcamento', 'personalizada'].forEach(t => {
    document.getElementById('tabpage-' + t).style.display = t === tab ? 'block' : 'none';
    const btn = document.getElementById('tab-' + t);
    btn.style.color = t === tab ? 'var(--primary)' : 'var(--muted)';
    btn.style.borderBottomColor = t === tab ? 'var(--primary)' : 'transparent';
  });
}
navigateTab('orcamento');

// ── Orçamento ─────────────────────────────────────────────
async function loadOrcamentos() {
  const r = await AZ_DB.get(AZ_DB.tbl('solicitacoes_orcamento'), '?select=*&order=created_at.desc');
  _orcamentos = r || [];
}

function setFiltroOrc(status) {
  _filtroOrc = status;
  document.getElementById('orcFiltroTodas').classList.toggle('on', status === 'todas');
  document.getElementById('orcFiltroNovas').classList.toggle('on', status === 'novo');
  document.getElementById('orcFiltroRespondidas').classList.toggle('on', status === 'respondido');
  renderOrcamentos();
}

function renderOrcamentos() {
  const q = (document.getElementById('orcamentoSearch') || {}).value || '';
  let filtered = _orcamentos;
  if (_filtroOrc !== 'todas') filtered = filtered.filter(s => s.status === _filtroOrc);
  if (q) {
    const qq = q.toLowerCase();
    filtered = filtered.filter(s => [s.nome, s.email, s.telefone, s.peca].filter(Boolean).join(' ').toLowerCase().includes(qq));
  }

  const novas = _orcamentos.filter(s => s.status === 'novo').length;
  document.getElementById('orcamentoCount').textContent =
    `${_orcamentos.length} solicitação(ões) recebida(s) · ${novas} nova(s)`;

  document.getElementById('orcamentoList').innerHTML = filtered.length
    ? '<div class="divide-y">' + filtered.map(s => `
        <div class="item-row">
          <div style="min-width:0;flex:1">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="item-name">${esc(s.nome)}</span>
              <span class="badge" style="cursor:pointer;background:${s.status === 'novo' ? '#dbeafe' : '#dcfce7'};color:${s.status === 'novo' ? '#1d4ed8' : '#166534'};border-color:transparent"
                    onclick="toggleStatusOrc('${s.id}')">${s.status === 'novo' ? '● Novo' : '✓ Respondido'}</span>
            </div>
            <div class="item-meta">${esc(s.peca)}</div>
            <div class="item-meta">${esc(s.email)}${s.telefone ? ' · ' + esc(s.telefone) : ''} · ${fmtDateTime(s.created_at)}</div>
            ${s.mensagem ? `<div style="font-size:12px;font-style:italic;color:var(--muted);margin-top:2px">${esc(s.mensagem)}</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="item-actions">
              <button class="btn btn-ghost btn-sm btn-icon" onclick="openOrcamentoModal('${s.id}')">✎</button>
              <button class="btn btn-danger-ghost btn-sm btn-icon" onclick="openConfirm('Excluir solicitação?','Esta ação não pode ser desfeita.',()=>{deleteOrcamento('${s.id}')})">✕</button>
            </div>
          </div>
        </div>`).join('') + '</div>'
    : '<div class="empty-state">Nenhuma solicitação encontrada.</div>';
}

async function toggleStatusOrc(id) {
  const s = _orcamentos.find(x => x.id === id);
  if (!s) return;
  const novoStatus = s.status === 'novo' ? 'respondido' : 'novo';
  try {
    await AZ_DB.update(AZ_DB.tbl('solicitacoes_orcamento'), id, { status: novoStatus });
    s.status = novoStatus;
    renderOrcamentos();
  } catch (e) { showToast('Erro ao atualizar status', 'error'); }
}

function openOrcamentoModal(id) {
  const s = id ? _orcamentos.find(x => x.id === id) : null;
  document.getElementById('orcamentoModalTitle').textContent = s ? 'Editar solicitação' : 'Nova solicitação';
  document.getElementById('orcamentoId').value        = id || '';
  document.getElementById('orcamentoNome').value      = s ? s.nome : '';
  document.getElementById('orcamentoEmail').value     = s ? s.email : '';
  document.getElementById('orcamentoTelefone').value  = s ? s.telefone || '' : '';
  document.getElementById('orcamentoPeca').value      = s ? s.peca : '';
  document.getElementById('orcamentoMensagem').value  = s ? s.mensagem || '' : '';
  document.getElementById('orcamentoOverlay').classList.add('open');
}
function closeOrcamentoModal() { document.getElementById('orcamentoOverlay').classList.remove('open'); }

async function saveOrcamento() {
  const nome  = document.getElementById('orcamentoNome').value.trim();
  const email = document.getElementById('orcamentoEmail').value.trim();
  const peca  = document.getElementById('orcamentoPeca').value.trim();
  if (!nome || !email || !peca) { showToast('Preencha nome, e-mail e peça', 'error'); return; }

  const id  = document.getElementById('orcamentoId').value;
  const obj = {
    nome, email, peca,
    telefone: document.getElementById('orcamentoTelefone').value.trim() || null,
    mensagem: document.getElementById('orcamentoMensagem').value.trim() || null
  };

  showLoading(true);
  try {
    if (id) {
      await AZ_DB.update(AZ_DB.tbl('solicitacoes_orcamento'), id, obj);
      const i = _orcamentos.findIndex(s => s.id === id);
      _orcamentos[i] = { ..._orcamentos[i], ...obj };
      showToast('Solicitação atualizada');
    } else {
      obj.status = 'novo';
      const r = await AZ_DB.insert(AZ_DB.tbl('solicitacoes_orcamento'), obj);
      _orcamentos.unshift(r[0] || obj);
      showToast('Solicitação cadastrada');
    }
    closeOrcamentoModal();
    renderOrcamentos();
  } catch (e) { showToast('Erro ao salvar', 'error'); }
  finally { showLoading(false); }
}

async function deleteOrcamento(id) {
  showLoading(true);
  try {
    await AZ_DB.remove(AZ_DB.tbl('solicitacoes_orcamento'), id);
    _orcamentos = _orcamentos.filter(s => s.id !== id);
    renderOrcamentos();
    showToast('Solicitação excluída');
  } catch (e) { showToast('Erro ao excluir', 'error'); }
  finally { showLoading(false); }
}

// ── Personalizada ─────────────────────────────────────────
async function loadPersonalizadas() {
  const r = await AZ_DB.get(AZ_DB.tbl('solicitacoes_personalizadas'), '?select=*&order=created_at.desc');
  _personalizadas = r || [];
}

function setFiltroPers(status) {
  _filtroPers = status;
  document.getElementById('persFiltroTodas').classList.toggle('on', status === 'todas');
  document.getElementById('persFiltroNovas').classList.toggle('on', status === 'novo');
  document.getElementById('persFiltroRespondidas').classList.toggle('on', status === 'respondido');
  renderPersonalizadas();
}

function renderPersonalizadas() {
  const q = (document.getElementById('personalizadaSearch') || {}).value || '';
  let filtered = _personalizadas;
  if (_filtroPers !== 'todas') filtered = filtered.filter(s => s.status === _filtroPers);
  if (q) {
    const qq = q.toLowerCase();
    filtered = filtered.filter(s => [s.nome, s.email, s.telefone, s.descricao].filter(Boolean).join(' ').toLowerCase().includes(qq));
  }

  const novas = _personalizadas.filter(s => s.status === 'novo').length;
  document.getElementById('personalizadaCount').textContent =
    `${_personalizadas.length} solicitação(ões) recebida(s) · ${novas} nova(s)`;

  document.getElementById('personalizadaList').innerHTML = filtered.length
    ? '<div class="divide-y">' + filtered.map(s => `
        <div class="item-row">
          <div style="min-width:0;flex:1">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="item-name">${esc(s.nome)}</span>
              <span class="badge" style="cursor:pointer;background:${s.status === 'novo' ? '#dbeafe' : '#dcfce7'};color:${s.status === 'novo' ? '#1d4ed8' : '#166534'};border-color:transparent"
                    onclick="toggleStatusPers('${s.id}')">${s.status === 'novo' ? '● Novo' : '✓ Respondido'}</span>
            </div>
            <div class="item-meta">${esc(s.descricao)}</div>
            <div class="item-meta">${s.email ? esc(s.email) + ' · ' : ''}${s.telefone ? esc(s.telefone) + ' · ' : ''}${fmtDateTime(s.created_at)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="item-actions">
              <button class="btn btn-ghost btn-sm btn-icon" onclick="openPersonalizadaModal('${s.id}')">✎</button>
              <button class="btn btn-danger-ghost btn-sm btn-icon" onclick="openConfirm('Excluir solicitação?','Esta ação não pode ser desfeita.',()=>{deletePersonalizada('${s.id}')})">✕</button>
            </div>
          </div>
        </div>`).join('') + '</div>'
    : '<div class="empty-state">Nenhuma solicitação encontrada.</div>';
}

async function toggleStatusPers(id) {
  const s = _personalizadas.find(x => x.id === id);
  if (!s) return;
  const novoStatus = s.status === 'novo' ? 'respondido' : 'novo';
  try {
    await AZ_DB.update(AZ_DB.tbl('solicitacoes_personalizadas'), id, { status: novoStatus });
    s.status = novoStatus;
    renderPersonalizadas();
  } catch (e) { showToast('Erro ao atualizar status', 'error'); }
}

function openPersonalizadaModal(id) {
  const s = id ? _personalizadas.find(x => x.id === id) : null;
  document.getElementById('personalizadaModalTitle').textContent = s ? 'Editar solicitação' : 'Nova solicitação';
  document.getElementById('personalizadaId').value        = id || '';
  document.getElementById('personalizadaNome').value      = s ? s.nome : '';
  document.getElementById('personalizadaEmail').value     = s ? s.email || '' : '';
  document.getElementById('personalizadaTelefone').value  = s ? s.telefone || '' : '';
  document.getElementById('personalizadaDescricao').value = s ? s.descricao : '';
  document.getElementById('personalizadaOverlay').classList.add('open');
}
function closePersonalizadaModal() { document.getElementById('personalizadaOverlay').classList.remove('open'); }

async function savePersonalizada() {
  const nome      = document.getElementById('personalizadaNome').value.trim();
  const descricao = document.getElementById('personalizadaDescricao').value.trim();
  if (!nome || !descricao) { showToast('Preencha nome e descrição', 'error'); return; }

  const id  = document.getElementById('personalizadaId').value;
  const obj = {
    nome, descricao,
    email:    document.getElementById('personalizadaEmail').value.trim() || null,
    telefone: document.getElementById('personalizadaTelefone').value.trim() || null
  };

  showLoading(true);
  try {
    if (id) {
      await AZ_DB.update(AZ_DB.tbl('solicitacoes_personalizadas'), id, obj);
      const i = _personalizadas.findIndex(s => s.id === id);
      _personalizadas[i] = { ..._personalizadas[i], ...obj };
      showToast('Solicitação atualizada');
    } else {
      obj.status = 'novo';
      const r = await AZ_DB.insert(AZ_DB.tbl('solicitacoes_personalizadas'), obj);
      _personalizadas.unshift(r[0] || obj);
      showToast('Solicitação cadastrada');
    }
    closePersonalizadaModal();
    renderPersonalizadas();
  } catch (e) { showToast('Erro ao salvar', 'error'); }
  finally { showLoading(false); }
}

async function deletePersonalizada(id) {
  showLoading(true);
  try {
    await AZ_DB.remove(AZ_DB.tbl('solicitacoes_personalizadas'), id);
    _personalizadas = _personalizadas.filter(s => s.id !== id);
    renderPersonalizadas();
    showToast('Solicitação excluída');
  } catch (e) { showToast('Erro ao excluir', 'error'); }
  finally { showLoading(false); }
}

</script>
